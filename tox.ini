# Local test matrix. Accelerated by tox-uv (uv creates the envs and installs deps).
#
#   docker compose up -d
#   PGPORT=5433 uv run tox            # run the whole matrix
#   PGPORT=5433 uv run tox -e py313-dj60-native
#
# Valid Python x Django pairs only (Django 6.0 needs Python >= 3.12; Django 5.1 tops out
# at Python 3.13). Each combination is run against both pool backends (native / djpool).
[tox]
requires =
    tox>=4.15
    tox-uv>=1.9
env_list =
    py310-dj{51,52}-{native,djpool}
    py311-dj{51,52}-{native,djpool}
    py312-dj{51,52,60}-{native,djpool}
    py313-dj{51,52,60}-{native,djpool}
    py314-dj{52,60}-{native,djpool}

[testenv]
package = editable
deps =
    pytest>=8.0
    pytest-django>=4.8
    coverage[toml]>=7.4
    psycopg[binary,pool]>=3.1.8
    dj51: django>=5.1,<5.2
    dj52: django>=5.2,<6.0
    dj60: django>=6.0,<6.1
    djpool: django-db-connection-pool>=1.2.6
setenv =
    native: DJANGO_PG_REAL_POOL_BACKEND = native
    djpool: DJANGO_PG_REAL_POOL_BACKEND = dj_db_conn_pool
    PGHOST = {env:PGHOST:127.0.0.1}
    PGPORT = {env:PGPORT:5432}
    PGUSER = {env:PGUSER:postgres}
    PGPASSWORD = {env:PGPASSWORD:postgres}
    PGDATABASE = {env:PGDATABASE:django_pg_real_pool}
commands =
    pytest {posargs}
