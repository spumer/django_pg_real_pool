# Local PostgreSQL for running the test suite.
#
#   docker compose up -d
#   PGHOST=127.0.0.1 PGPORT=5433 PGUSER=postgres PGPASSWORD=postgres uv run pytest
#
# Host port 5433 is used to avoid clashing with a local/another PostgreSQL on 5432.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: django_pg_real_pool
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
